  .fill-layer{

  @keyframes strokeReveal {

  /* 既存スタイルに追加 */

<script>
  // Topリンククリック用（既存）
  const fillText = document.getElementById("fillText");
  fillText.style.cursor = "pointer";
  fillText.addEventListener("click", () => {
    fadeToTop();
  });

  (function(){
    const s = document.getElementById("strokeText");
    const f = document.getElementById("fillText");

    const drawTime = 4500;  // stroke 描画時間
    document.documentElement.style.setProperty("--draw-time", drawTime+"ms");

    function start(){
      let len = 2400;
      try{ len = s.getComputedTextLength(); }catch(e){}
      document.documentElement.style.setProperty("--len", len);
      s.style.strokeDasharray = len;
      s.style.strokeDashoffset = len;

      void s.offsetWidth;
      s.classList.add("anim-draw");

      // stroke 完全描画後に fill アニメーション
      setTimeout(()=> f.classList.add("anim-fill"), drawTime * 0.6);
    }

    if(document.fonts) document.fonts.ready.then(start);
    else setTimeout(start, 200);
  })();
 
  // -------------------------------
  // フェードアウトしてTop.htmlに遷移する関数
  function fadeToTop() {
    document.body.classList.add("fade-out");
    setTimeout(() => {
      window.location.href = "Top.html";
    }, 1000); 
  }

  // ページ読み込みから5秒後に自動遷移
  setTimeout(fadeToTop, 5000);
